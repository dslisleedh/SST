# general settings
name: SSTLarge_DFLIP_X3
model_type: ESRModel
scale: 3
num_gpu: 4
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: DFLIP
    type: DownsampleImageDataset
    dataroot_gt: /home2/prof/ro/dslisleedh/datasets/DFLIP.lmdb
    filename_tmpl: '{}'
    io_backend:
      type: lmdb

    gt_size: 192
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: true

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Set5/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Set5/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  val_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Set14/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Set14/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  val_3:
    name: B100
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/B100/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/B100/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  val_4:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Urban100/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Urban100/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  val_5:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Manga109/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Manga109/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

# network structures
network_g:
  type: SST
  dim: 192
  window_sizes: [16, 32, 64, 16, 32, 64]
  num_heads: [6, 6, 6, 6, 6, 6]
  ranks: [16, 16, 16, 32, 32, 32]
  n_blocks: 8
  exp_ratio: 2
  attn_type: RIB
  rib_hidden_dim: 32
  rib_n_freqs: 10
  upscaling_factor: 3
  upsampler_type: pixelshuffle
  gate_type: DWC
  intermediate_dim: 96
  
# path
path:
  pretrain_network_g: pretrained_models/SSTLarge_DFLIP_X2.pth
  param_key_g: params_ema
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 2.5e-4
    weight_decay: 0
    betas: [0.9, 0.9]

  scheduler:
    type: MultiStepLR
    milestones: [125000, 200000, 225000, 237500, 245000]
    gamma: 0.5

  total_iter: 250000
  warmup_iter: 20000

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 3
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
      crop_border: 3
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: RIN
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
