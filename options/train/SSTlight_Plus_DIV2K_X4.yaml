# general settings
name: SSTlight_Plus_DIV2K_X4
model_type: ESRModel
scale: 4
num_gpu: 4
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: DIV2K
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/DIV2K/DIV2K_train_HR_sub.lmdb
    dataroot_lq: /home/dhl2309/SAFMN/datasets/DIV2K/DIV2K_train_LR_bicubic/X4_sub.lmdb
    filename_tmpl: '{}'
    io_backend:
      type: lmdb

    gt_size: 384
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 16
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: true

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Set5/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Set5/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

  val_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Set14/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Set14/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

  val_3:
    name: B100
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/B100/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/B100/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

  val_4:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Urban100/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Urban100/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

  val_5:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Manga109/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Manga109/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

# network structures
network_g:
  type: SST
  dim: 48
  window_sizes: [16, 32, 48, 32, 48, 96]
  num_heads: [3, 3, 3, 3, 3, 3]
  ranks: [16, 16, 16, 24, 24, 24]
  n_blocks: 5
  exp_ratio: 1.5
  attn_type: RIB
  rib_hidden_dim: 32
  rib_n_freqs: 10
  upscaling_factor: 4
  upsampler_type: pixelshuffle_direct
  gate_type: DWC
  
# path
path:
  pretrain_network_g: pretrained_models/SSTlight_Plus_DFLIP_X3.pth
  param_key_g: params_ema
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 2.5e-4
    weight_decay: 0
    betas: [0.9, 0.9]

  scheduler:
    type: MultiStepLR
    milestones: [125000, 200000, 225000, 237500, 245000]
    gamma: 0.5

  total_iter: 250000
  warmup_iter: 20000

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500