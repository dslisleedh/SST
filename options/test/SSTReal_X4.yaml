# general settings
name: SSTRealStage1_ig_lambda2
model_type: EdmUNetRealModel
scale: 4
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0
find_unused_parameters: false

# degradation settings
degradation:
  sf: 4
  # the first degradation process
  resize_prob: [0.2, 0.7, 0.1]  # up, down, keep
  resize_range: [0.15, 1.5]
  gaussian_noise_prob: 0.5
  noise_range: [1, 30]
  poisson_scale_range: [0.05, 3.0]
  gray_noise_prob: 0.4
  jpeg_range: [30, 95]

  # the second degradation process
  second_order_prob: 0.5
  second_blur_prob: 0.8
  resize_prob2: [0.3, 0.4, 0.3]  # up, down, keep
  resize_range2: [0.3, 1.2]
  gaussian_noise_prob2: 0.5
  noise_range2: [1, 25]
  poisson_scale_range2: [0.05, 2.5]
  gray_noise_prob2: 0.4
  jpeg_range2: [30, 95]

  gt_size: 256
  resize_back: true
  use_sharp: false

# dataset settings
datasets:
  val_1:
    name: RealSet65
    type: SingleImageDataset
    dataroot_lq: /home/leedh97/SST/SinSR/testdata/RealSet65
    mean: 0.5
    std: 0.5
    io_backend:
      type: disk

  val_2:
    name: LQ250
    type: SingleImageDataset
    dataroot_lq: /home/leedh97/SST/LQ250
    mean: 0.5
    std: 0.5
    io_backend:
      type: disk

# network structures
network_g:
  type: EDMUNet
  img_resolution: 192
  img_channels: 3
  scale: 4
  sigma_data: 0.5
  sigma_min: 0
  use_skip: true
  sampling_ig_lambda: 2.0

  dim: 192
  intermediate_dim: 96
  emb_channels: 768
  noise_channels: 192
  num_blocks: 14
  fuse_lr_till: 6
  ig_idx: 6
  attn_type: RIB
  window_sizes: [16, 32, 64, 16, 32, 64]
  num_heads: [6, 6, 6, 6, 6, 6]
  ranks: [16, 16, 16, 32, 32, 32]
  rib_hidden_dim: 32
  rib_n_freqs: 10
  exp_ratio: 3
  gate_type: DWC
  drop_p: 0.05

# path
path:
  pretrain_network_g: pretrained_models/SSTReal_X4.pth
  param_key_g: params_ema
  strict_load_g: true
  resume_state: ~

# testing settings
train:
  consistency_opt:
    sigma_min: 0
    sigma_max: 1

# validation settings
val:
  suffix: ~  # add suffix to saved images, if None, use exp name
  save_img: true

  metrics:
    clipiqa:
      type: calculate_clipiqa
      better: higher
    musiq:
      type: calculate_musiq
      better: higher
    maniqa:
      type: calculate_maniqa
      better: higher
    niqe:
      type: calculate_niqe
      better: lower
    liqe:
      type: calculate_liqe
      better: higher
    topiq_nr:
      type: calculate_topiq_nr
      better: higher
