name: SSTlight_Plus_X3
model_type: ESRModel
scale: 3
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1:  # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Set5/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Set5/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  test_2:  # the 2nd test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Set14/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Set14/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  test_3:  # the 1st test dataset
    name: B100
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/B100/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/B100/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  test_4:  # the 2nd test dataset
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Urban100/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Urban100/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  test_5:  # the 1st test dataset
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/Manga109/HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/Manga109/LR_bicubic/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  test_6:  # the 1st test dataset
    name: DIV2K
    type: PairedImageDataset
    dataroot_gt: /home/dhl2309/SAFMN/datasets/DIV2K/DIV2K_valid_HR
    dataroot_lq: /home/dhl2309/SAFMN/datasets/DIV2K/DIV2K_valid_LR_bicubic/X3
    io_backend:
      type: disk

  test_7:  # the 1st test dataset
    name: LSDIR
    type: PairedImageDataset
    dataroot_gt: /data/datasets/LSDIR/Valid/HR
    dataroot_lq: /data/datasets/LSDIR/Valid/LR/X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

# network structures
network_g:
  type: SST
  dim: 48
  window_sizes: [16, 32, 48, 32, 48, 96]
  num_heads: [3, 3, 3, 3, 3, 3]
  ranks: [16, 16, 16, 24, 24, 24]
  n_blocks: 5
  exp_ratio: 1.5
  attn_type: RIB
  rib_hidden_dim: 32
  rib_n_freqs: 10
  upscaling_factor: 3
  upsampler_type: pixelshuffle_direct
  gate_type: DWC

# path
path:
  # pretrain_network_g: pretrained_models/SSTlight_Plus_DIV2K_X3.pth
  pretrain_network_g: pretrained_models/SSTlight_Plus_DFLIP_X3.pth
  param_key_g: 'params_ema'
  strict_load_g: true

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 3
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 3
      test_y_channel: true
